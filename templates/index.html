<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RG PREMIUM</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:black;
color:white;
font-family:Arial;
}

.bg-card{
background:#0a0a0a;
border:1px solid #1a1a1a;
border-radius:20px;
box-shadow:0 10px 40px rgba(255,0,0,.2);
}

.btn-action{
background:linear-gradient(90deg,#ff0000,#8b0000);
}

.tab-btn.active{
background:#ff0000;
}

#musicToggle{
position:fixed;
top:25px;
right:25px;
width:45px;
height:45px;
border-radius:50%;
background:#1a0000;
border:2px solid red;
display:flex;
align-items:center;
justify-content:center;
}

#toast{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:12px 30px;
border-radius:50px;
display:none;
}

</style>
</head>

<body class="flex flex-col items-center p-4">

<audio id="music1" src="/static/music1.mp3"></audio>
<audio id="music2" src="/static/music2.mp3"></audio>
<audio id="music3" src="/static/music3.mp3"></audio>

<button id="musicToggle" onclick="toggleMusic()">
<i id="musicIcon" class="fas fa-play"></i>
</button>

<div class="w-full max-w-md mt-8 text-center">

<h1 class="text-4xl font-bold text-red-600">
RG <span class="text-white">PREMIUM</span>
</h1>

<p class="text-xs text-gray-400">
SYSTEM ONLINE • WEB BY REHAN
</p>

<div class="flex gap-2 mt-10 mb-6 p-1 bg-card">

<button id="fTab" onclick="switchTab('friend')" class="tab-btn active w-1/2 py-3">
Add Friend
</button>

<button id="iTab" onclick="switchTab('info')" class="tab-btn w-1/2 py-3">
Info
</button>

</div>

<!-- SPAM PANEL -->

<div id="friendPanel" class="bg-card p-6 space-y-4">

<input id="f_target" placeholder="Target UID" class="w-full p-3 bg-black border border-gray-700 rounded">

<input id="f_limit" type="number" placeholder="How Many Accounts?" class="w-full p-3 bg-black border border-gray-700 rounded">

<button onclick="sendFriendRequest()" class="btn-action w-full py-3 rounded">
SEND SPAM REQUEST
</button>

<div id="f_log"></div>

</div>

<!-- INFO PANEL -->

<div id="infoPanel" class="bg-card p-6 hidden">

<input id="i_uid" placeholder="Target UID" class="w-full p-3 bg-black border border-gray-700 rounded">

<button onclick="getInfo()" class="btn-action w-full py-3 rounded mt-4">
GET INFO
</button>

<div id="i_log" class="mt-4 text-sm"></div>

</div>

<!-- ADMIN -->

<div class="bg-card p-5 mt-6 text-center">

<p class="text-xs text-gray-400 mb-3">
CONTACT ADMIN
</p>

<a href="https://instagram.com/rehan_gaming_2.0_" target="_blank">

<button class="btn-action w-full py-4 rounded flex justify-center gap-3">
<i class="fab fa-instagram"></i>
CLICK TO CONTACT ADMIN
</button>

</a>

</div>

<div id="toast"></div>

</div>

<script>

function switchTab(t){

friendPanel.classList.toggle('hidden',t!=='friend')
infoPanel.classList.toggle('hidden',t!=='info')

fTab.classList.toggle('active',t==='friend')
iTab.classList.toggle('active',t==='info')

}

function showNotify(msg,type){

toast.innerText=msg
toast.style.background=type==="success"?"green":"red"
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

async function sendFriendRequest(){

if(!f_target.value||!f_limit.value)
return showNotify("Fill all boxes","error")

f_log.innerHTML="Sending..."

try{

const r=await fetch("/api/spam_add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
target:f_target.value,
limit:f_limit.value
})
})

const d=await r.json()

const success=d.success ?? 0
const failed=d.failed ?? 0
const duplicate=d.duplicate ?? 0
const total=d.total ?? (success+failed+duplicate)

f_log.innerHTML=`

<div class="text-green-400">✔️ Success : ${success}</div>
<div class="text-red-400">✖️ Failed : ${failed}</div>
<div class="text-yellow-400">⚠️ Duplicate : ${duplicate}</div>
<div class="text-blue-400">📊 Total Used : ${total}</div>

`

showNotify("Spam Completed","success")

}catch{

f_log.innerHTML=`<div class="text-red-500">API ERROR</div>`
showNotify("Server Error","error")

}

}

async function getInfo(){

const uid=i_uid.value

if(!uid)return showNotify("Enter UID","error")

i_log.innerHTML="Loading info..."

try{

const res=await fetch("/api/info",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({uid})
})

const data=await res.json()

const acc=data.AccountInfo || {}
const guild=data.GuildInfo || {}
const social=data.socialinfo || {}

const createDate = acc.AccountCreateTime ? new Date(acc.AccountCreateTime*1000).toLocaleString() : "-"
const lastLogin = acc.AccountLastLogin ? new Date(acc.AccountLastLogin*1000).toLocaleString() : "-"

i_log.innerHTML=`

<div class="grid grid-cols-2 gap-y-2 text-xs">

<div class="text-red-400">NAME</div>
<div>${acc.AccountName || "-"}</div>

<div class="text-yellow-400">UID</div>
<div>${uid}</div>

<div class="text-green-400">LEVEL</div>
<div>${acc.AccountLevel || "-"}</div>

<div class="text-cyan-400">LIKES</div>
<div>${acc.AccountLikes || "-"}</div>

<div class="text-purple-400">REGION</div>
<div>${acc.AccountRegion || "-"}</div>

<div class="text-blue-400">GUILD</div>
<div>${guild.GuildName || "-"}</div>

<div class="text-pink-400">BIO</div>
<div>${social.signature || "-"}</div>

<div class="text-orange-400">CREATE</div>
<div>${createDate}</div>

<div class="text-gray-300">LAST LOGIN</div>
<div>${lastLogin}</div>

</div>
`

showNotify("Info Loaded","success")

}catch{

i_log.innerHTML="Failed to load info"
showNotify("Request Failed","error")

}

}

const musicTracks=[music1,music2,music3]

let play=false
let current=0

function toggleMusic(){

if(play){

musicTracks.forEach(m=>m.pause())

musicIcon.className="fas fa-play"

play=false

}else{

musicTracks[current].play()

musicTracks[current].onended=()=>{
current=(current+1)%musicTracks.length
musicTracks[current].play()
}

musicIcon.className="fas fa-pause"

play=true

}

}

</script>

</body>
</html>
